<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#050505" />
  <title>Welcome Back — Sign In to CareerOS</title>
  <meta name="description" content="Sign in to CareerOS — access your professional profile, achievements and career progress in one unified, verified operating system." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />

  <!-- Google Identity Services (real OAuth; activates once GOOGLE_CLIENT_ID is set in js/app.js) -->
  <script src="https://accounts.google.com/gsi/client" async></script>
</head>
<body data-google-redirect="dashboard.html">
  <!-- Architectural background (matches homepage hero) -->
  <div class="ob-bg" aria-hidden="true">
    <div class="ob-bg__glow ob-bg__glow--1"></div>
    <div class="ob-bg__glow ob-bg__glow--2"></div>
    <div class="ob-bg__grid"></div>
    <div class="ob-bg__beam"></div>
  </div>

  <!-- TOP BAR: back + brand + progress -->
  <header class="ob-top">
    <div class="ob-top__inner">
      <a class="ob-back" href="index.html" aria-label="Back to home">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M15 5 L8 12 L15 19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </a>
      <button class="ob-back" id="obBack" type="button" aria-label="Go back" hidden>
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M15 5 L8 12 L15 19" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <a class="brand" href="index.html" aria-label="CareerOS home">
        <svg class="brand__mark" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M3.5 16.5 L9.5 10 L13.5 13 L20.5 5" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="20.5" cy="5" r="2" fill="#ffffff"/>
        </svg>
        <span class="brand__name">𝘾𝙖𝙧𝙚𝙚𝙧𝙊𝙎</span>
      </a>

      <div class="ob-steps" id="obSteps" aria-hidden="true"></div>
    </div>
    <div class="ob-progress"><span class="ob-progress__fill" id="obProgressFill"></span></div>
  </header>

  <main class="ob-main" id="obMain">

    <!-- STEP 1 — WELCOME BACK -->
    <section class="ob-step is-active" data-step="1" aria-labelledby="si-title">
      <div class="ob-step__inner ob-welcome">
        <span class="ob-kicker">Welcome to CareerOS</span>
        <h1 class="ob-h1" id="si-title">Welcome Back</h1>
        <p class="ob-sub">Continue building your professional journey.</p>
        <p class="ob-desc">Access your CareerOS profile, achievements and progress.</p>

        <div data-oauth-block>
          <div class="ob-welcome__actions">
            <button class="btn btn--primary btn--lg ob-oauth" type="button" data-google-connect>
              <svg viewBox="0 0 24 24" aria-hidden="true" class="ob-oauth__icon">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.27-4.74 3.27-8.1z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.65l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84A11 11 0 0 0 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.11a6.6 6.6 0 0 1 0-4.22V7.05H2.18a11 11 0 0 0 0 9.9l3.66-2.84z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1A11 11 0 0 0 2.18 7.05l3.66 2.84C6.71 7.31 9.14 5.38 12 5.38z"/>
              </svg>
              Continue with Google
            </button>
          </div>
          <div class="ob-divider">or</div>
          <button class="ob-textbtn" type="button" data-show-email>Continue with Email</button>
        </div>

        <!-- Email sign-in panel -->
        <div id="obEmailPanel" hidden>
          <div class="ob-form" data-email-entry>
            <label class="ob-input-label" for="siEmail">Email Address</label>
            <input class="ob-input" id="siEmail" type="email" inputmode="email" autocomplete="email" placeholder="you@example.com" />
            <button class="btn btn--primary btn--lg" type="button" data-email-continue>Continue</button>
          </div>
          <div data-code-entry hidden>
            <span class="ob-otp__sent">Verification code sent to <b data-email-target>your email</b>.</span>
            <div class="ob-otp__boxes" role="group" aria-label="6 digit verification code">
              <input class="ob-otp__box" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 1" />
              <input class="ob-otp__box" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 2" />
              <input class="ob-otp__box" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 3" />
              <input class="ob-otp__box" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 4" />
              <input class="ob-otp__box" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 5" />
              <input class="ob-otp__box" type="text" inputmode="numeric" maxlength="1" aria-label="Digit 6" />
            </div>
            <div class="ob-otp__actions">
              <button class="btn btn--primary btn--lg" type="button" data-otp-verify>Verify Code</button>
              <button class="ob-skip" type="button" data-otp-resend>Resend Code</button>
            </div>
          </div>
        </div>

        <p class="ob-switch">Don't have an account? <a href="signup.html">Sign Up</a></p>
      </div>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
